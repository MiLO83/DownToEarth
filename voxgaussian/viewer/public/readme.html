<!doctype html>
<!--
  readme.html — markdown-rendered README for the live site.
  Fetches /README.md and renders it via marked.js (CDN). MIT.
-->
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Down To Earth — README</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<style>
  :root {
    --bg: #0a0a12;
    --panel: rgba(8,10,18,0.82);
    --panel-border: rgba(255,255,255,0.15);
    --text: #f5f5f7;
    --text-dim: rgba(245,245,247,0.65);
    --accent: #ffb070;
    --code-bg: rgba(255,255,255,0.06);
    --code-border: rgba(255,255,255,0.10);
    --link: #7ec8ff;
  }
  html, body { margin: 0; padding: 0; background: var(--bg); color: var(--text);
    font-family: -apple-system, "Segoe UI", "Helvetica Neue", Arial, sans-serif;
    line-height: 1.6; -webkit-font-smoothing: antialiased; }
  body { padding: 64px 24px 96px; }
  main { max-width: 920px; margin: 0 auto; }
  nav.top {
    position: fixed; top: 12px; left: 0; right: 0;
    display: flex; justify-content: center; gap: 8px;
    pointer-events: none; z-index: 10;
  }
  nav.top a {
    pointer-events: auto;
    background: var(--panel); border: 1px solid var(--panel-border);
    padding: 6px 14px; border-radius: 999px;
    font-size: 11px; letter-spacing: 0.08em; text-transform: uppercase;
    color: var(--text-dim); text-decoration: none;
    backdrop-filter: blur(6px); -webkit-backdrop-filter: blur(6px);
  }
  nav.top a:hover { color: var(--text); background: rgba(20,24,36,0.92); }
  nav.top a.accent { color: var(--accent); border-color: var(--accent); }

  h1, h2, h3, h4 { color: var(--text); line-height: 1.25; margin: 1.6em 0 0.5em; }
  h1 { font-size: 2.0em; border-bottom: 1px solid var(--panel-border); padding-bottom: 0.3em; }
  h2 { font-size: 1.5em; border-bottom: 1px solid var(--panel-border); padding-bottom: 0.2em; }
  h3 { font-size: 1.2em; color: var(--accent); }
  h4 { font-size: 1.0em; color: var(--text-dim); }

  p { margin: 0.7em 0; }
  a { color: var(--link); text-decoration: none; }
  a:hover { text-decoration: underline; }
  blockquote {
    border-left: 3px solid var(--accent);
    padding: 4px 16px; margin: 16px 0;
    color: var(--text-dim); background: rgba(255,176,112,0.04);
    border-radius: 4px;
  }
  blockquote p { margin: 0.3em 0; }
  blockquote code { background: rgba(255,255,255,0.08); }

  code {
    font-family: ui-monospace, "SF Mono", "Cascadia Mono", Menlo, Consolas, monospace;
    font-size: 0.9em;
    background: var(--code-bg);
    padding: 1px 6px;
    border-radius: 3px;
    border: 1px solid var(--code-border);
  }
  pre {
    background: var(--code-bg); border: 1px solid var(--code-border);
    padding: 12px 16px; border-radius: 6px; overflow-x: auto;
    font-size: 0.88em; line-height: 1.45;
  }
  pre code { background: none; border: none; padding: 0; font-size: 1em; }

  table { border-collapse: collapse; margin: 16px 0; width: 100%;
    font-size: 0.92em; }
  th, td { border: 1px solid var(--panel-border); padding: 8px 12px; text-align: left;
    vertical-align: top; }
  th { background: rgba(255,255,255,0.05); color: var(--text); font-weight: 600; }
  tr:nth-child(2n) td { background: rgba(255,255,255,0.025); }

  ul, ol { padding-left: 24px; }
  li { margin: 0.25em 0; }

  hr { border: none; border-top: 1px solid var(--panel-border); margin: 28px 0; }

  img { max-width: 100%; height: auto; border-radius: 6px; }

  /* GFM details/summary look */
  details { background: rgba(255,255,255,0.03); border: 1px solid var(--panel-border);
    border-radius: 6px; padding: 8px 12px; margin: 12px 0; }
  summary { cursor: pointer; color: var(--accent); }

  /* tight column tables (the dual-column layman/technical pattern in our README) */
  td > p:first-child { margin-top: 0; }
  td > p:last-child { margin-bottom: 0; }

  #loading {
    position: fixed; inset: 0; display: flex; align-items: center; justify-content: center;
    background: var(--bg); z-index: 50; flex-direction: column; gap: 12px;
    transition: opacity 0.3s ease;
  }
  #loading.done { opacity: 0; pointer-events: none; }
  #loading .spinner {
    width: 28px; height: 28px; border: 3px solid rgba(255,255,255,0.1);
    border-top-color: var(--accent); border-radius: 50%;
    animation: spin 0.9s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>
<nav class="top">
  <a href="/" class="accent">← scene demo</a>
  <a href="/uvw">uvw explainer</a>
  <a href="https://github.com/MiLO83/DownToEarth">source on github</a>
</nav>
<div id="loading"><div class="spinner"></div><div style="color:rgba(245,245,247,0.55); font-size:12px;">loading README.md…</div></div>
<main id="content"></main>

<script type="module">
import { marked } from 'https://cdn.jsdelivr.net/npm/marked@12.0.0/lib/marked.esm.js';

marked.setOptions({
  gfm: true,        // GitHub-flavored markdown — tables, autolinks, task lists
  breaks: false,
  pedantic: false,
});

// Allow raw HTML through (our README uses <table> blocks for the dual-column layout).
// marked already allows HTML by default; just don't sanitize.

try {
  const md = await fetch('/README.md').then(r => {
    if (!r.ok) throw new Error(`Failed to fetch README.md: ${r.status}`);
    return r.text();
  });
  const html = marked.parse(md);
  document.getElementById('content').innerHTML = html;
  document.getElementById('loading').classList.add('done');

  // Rewrite GitHub-relative links to point to the source repo (so anchors
  // inside the README that say things like ./voxgaussian/README.md actually
  // resolve to GitHub instead of breaking on pages.dev)
  for (const a of document.querySelectorAll('main a')) {
    const href = a.getAttribute('href') || '';
    if (href.startsWith('http') || href.startsWith('#') || href.startsWith('/')) continue;
    a.setAttribute('href', 'https://github.com/MiLO83/DownToEarth/blob/main/' + href);
  }
} catch (e) {
  document.getElementById('content').innerHTML =
    `<h1>Couldn't load README</h1><pre>${e.message}</pre>` +
    `<p>Try <a href="https://github.com/MiLO83/DownToEarth">the source on github</a> directly.</p>`;
  document.getElementById('loading').classList.add('done');
}
</script>
</body>
</html>
