<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>voxgaussian — live</title>
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
<style>
  html, body { margin: 0; padding: 0; height: 100%; background: #0a0a12; overflow: hidden; font-family: -apple-system, "Segoe UI", "Helvetica Neue", Arial, sans-serif; color: #f5f5f7; }
  #app { position: fixed; inset: 0; }
  #hud {
    position: fixed; top: 14px; left: 14px;
    background: rgba(8,10,18,0.78);
    border: 1px solid rgba(255,255,255,0.15);
    padding: 10px 14px;
    border-radius: 8px;
    font-size: 13px;
    line-height: 1.5;
    backdrop-filter: blur(6px);
    -webkit-backdrop-filter: blur(6px);
    max-width: 380px;
    pointer-events: none;
  }
  #hud .k { color: #ffb070; letter-spacing: 0.04em; text-transform: uppercase; font-size: 11px; }
  #hud .v { font-variant-numeric: tabular-nums; }
  #hud .bar { display: flex; align-items: center; gap: 2px; margin-top: 4px; height: 8px; }
  #hud .bar > .seg { height: 8px; }
  #hud canvas { display: block; margin-top: 6px; background: rgba(0,0,0,0.4); border-radius: 4px; }
  #hud .row-label { font-size: 10px; color: rgba(245,245,247,0.55); margin-top: 4px; }
  #status {
    position: fixed; bottom: 14px; left: 14px;
    font-size: 12px; color: rgba(245,245,247,0.5);
  }
  #status.connected { color: #5cb85c; }
  #status.error     { color: #e85a5a; }
  #vr-btn-wrap {
    position: fixed; bottom: 14px; right: 14px;
    display: flex; gap: 8px;
  }
  .btn {
    pointer-events: auto;
    background: rgba(20,24,36,0.85);
    border: 1px solid rgba(255,255,255,0.25);
    color: #f5f5f7;
    padding: 8px 16px;
    border-radius: 999px;
    font-size: 13px;
    cursor: pointer;
    backdrop-filter: blur(6px);
    -webkit-backdrop-filter: blur(6px);
  }
  .btn:hover { background: rgba(40,46,60,0.95); }
  .btn.active { background: #ffb070; color: #1a1a22; border-color: #ffb070; }
  #legend {
    position: fixed; top: 14px; right: 14px;
    background: rgba(8,10,18,0.78);
    border: 1px solid rgba(255,255,255,0.15);
    padding: 8px 12px; border-radius: 8px;
    font-size: 11px; line-height: 1.6;
    pointer-events: none;
  }
  #legend .row { display: flex; align-items: center; gap: 6px; }
  #legend .swatch { width: 12px; height: 12px; border-radius: 2px; border: 1px solid rgba(0,0,0,0.4); }
  #mode-toggle {
    position: fixed; top: 14px; left: 50%; transform: translateX(-50%);
    display: flex; gap: 4px;
    background: rgba(8,10,18,0.78);
    border: 1px solid rgba(255,255,255,0.15);
    padding: 4px;
    border-radius: 999px;
    pointer-events: auto;
  }
  #mode-toggle .btn { padding: 6px 14px; font-size: 12px; border: none; border-radius: 999px; }
  /* Continuous-refine controls — hidden by default, shown when a pipeline
     WebSocket is connected (so pages.dev visitors never see a dead button). */
  #pipeline-ctrl {
    position: fixed; top: 62px; left: 50%; transform: translateX(-50%);
    display: none;
    pointer-events: auto;
  }
  #pipeline-ctrl.connected { display: block; }
  #stop-refine-btn {
    background: rgba(200, 70, 70, 0.92);
    border: 1px solid rgba(255, 120, 120, 0.55);
    color: #fff;
    padding: 8px 16px;
    font-size: 12px;
    border-radius: 999px;
    cursor: pointer;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    backdrop-filter: blur(6px);
    -webkit-backdrop-filter: blur(6px);
  }
  #stop-refine-btn:hover { background: rgba(225, 95, 95, 0.96); }
  #stop-refine-btn:disabled { background: rgba(80, 60, 60, 0.75); cursor: wait; opacity: 0.85; }
  #pipeline-ctrl .hint {
    font-size: 10px; color: rgba(245,245,247,0.55);
    letter-spacing: 0.05em; text-align: center; margin-top: 6px;
    pointer-events: none;
  }
</style>
</head>
<body>
<div id="app"></div>
<div id="hud">
  <div><span class="k">scene</span> <span id="hud-scene" class="v">—</span></div>
  <div><span class="k">iter</span> <span id="hud-iter" class="v">0</span></div>
  <div><span class="k">voxels</span> <span id="hud-voxels" class="v">0</span> active, <span id="hud-converged" class="v">0%</span> converged</div>
  <div><span class="k">mean conf</span> <span id="hud-meanconf" class="v">—</span></div>
  <div><span class="k">res</span> <span id="hud-res" class="v">—</span></div>
  <div class="row-label">class distribution</div>
  <div class="bar" id="class-bar"></div>
  <div class="row-label">confidence histogram (0% → 100%)</div>
  <canvas id="confidence-chart" width="320" height="56"></canvas>
  <div class="row-label">change-rate trend (recent iters)</div>
  <canvas id="trend-chart" width="320" height="56"></canvas>
</div>
<div id="legend"></div>
<div id="status">disconnected</div>
<div id="mode-toggle">
  <button class="btn active" data-mode="cubes">OCCUPANCY</button>
  <button class="btn" data-mode="uvw">UVW</button>
  <button class="btn" data-mode="gaussian">GAUSSIAN</button>
</div>
<div id="pipeline-ctrl">
  <button id="stop-refine-btn">⏸ STOP REFINE</button>
  <div class="hint">auto-improving — click to finish current iter + bake</div>
</div>
<div id="vr-btn-wrap"></div>

<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.169.0/build/three.module.js",
    "three/addons/": "https://unpkg.com/three@0.169.0/examples/jsm/"
  }
}
</script>
<script type="module" src="js/app.js"></script>
</body>
</html>
